name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      TESTING_PAGE: ${{ secrets.TESTING_PAGE }}
      STANDARD_USER_PASSWORD: ${{ secrets.STANDARD_USER_PASSWORD }}
      STANDARD_USER_EMAIL: ${{ secrets.STANDARD_USER_EMAIL }}
      LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
      PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
      PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
      ERROR_USER: ${{ secrets.ERROR_USER }}
      VISUAL_USER: ${{ secrets.VISUAL_USER }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # ✅ ADD CACHE HERE
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30